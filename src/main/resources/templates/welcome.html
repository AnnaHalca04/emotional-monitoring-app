<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stare Emoțională</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family:'DM Sans', sans-serif;
            background:#bfe8fb;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            overflow:hidden;
            position:relative;
        }

        .blob { position:absolute; border-radius:50%; background:rgba(255,255,255,0.18); }
        .b1 { width:320px; height:320px; top:-120px; left:-100px; }
        .b2 { width:220px; height:220px; bottom:-80px; right:-80px; }
        .b3 { width:120px; height:120px; top:60px; right:180px; }
        .b4 { width:150px; height:150px; bottom:100px; left:120px; }

        .card {
            width:min(500px, 92vw);
            background:white;
            border-radius:40px;
            padding:56px 48px;
            display:flex;
            flex-direction:column;
            align-items:center;
            box-shadow:0 24px 80px rgba(80,150,200,0.22);
            z-index:1;
            animation:fadeUp 0.6s ease both;
            text-align:center;
        }

        @keyframes fadeUp {
            from { opacity:0; transform:translateY(24px); }
            to   { opacity:1; transform:translateY(0); }
        }

        h2 {
            font-family:'DM Serif Display', serif;
            font-size:clamp(30px, 5vw, 40px);
            color:#1e2d3d;
            margin-bottom:10px;
        }

        .subtitle {
            font-size:clamp(14px, 1.8vw, 17px);
            color:#96b0c4;
            margin-bottom:36px;
        }

        .illu {
            width:min(320px, 80vw);
            height:auto;
            object-fit:contain;
            margin-bottom:40px;
        }

        .btn {
            display:block;
            width:100%;
            padding:18px;
            border-radius:50px;
            font-family:'DM Sans', sans-serif;
            font-size:clamp(15px, 1.8vw, 18px);
            font-weight:500;
            text-align:center;
            text-decoration:none;
            cursor:pointer;
            transition:all 0.2s;
            margin-bottom:16px;
        }

        .btn-outline {
            border:2px solid #1e2d3d;
            color:#1e2d3d;
            background:transparent;
        }
        .btn-outline:hover { background:#1e2d3d; color:white; }

        .btn-filled {
            border:none;
            background:#bfe8fb;
            color:#1e2d3d;
            margin-bottom:0;
        }
        .btn-filled:hover { background:#a5d8f0; transform:translateY(-2px); box-shadow:0 6px 20px rgba(100,170,210,0.3); }
    </style>
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>
<div class="blob b4"></div>

<div class="card">
    <h2>Bine ai venit 💙</h2>
    <p class="subtitle">Cunoaște-te mai bine, zi de zi</p>
    <img src="/images/Welcome.jpg" class="illu" alt="ilustratie"/>
    <a href="/login" class="btn btn-outline">Log in</a>
    <a href="/inregistrare" class="btn btn-filled">Sign Up</a>
</div>
</body>
</html>
